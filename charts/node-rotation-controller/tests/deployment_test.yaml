suite: Deployment policy carrier (spec §5.4, issue #119)
# After the ConfigMap → RotationPolicy CRD migration, the controller reads policy
# from RotationPolicy objects at reconcile time. The Deployment must no longer
# wire the legacy policy.yaml ConfigMap: no --config-path arg, no config volume,
# no volumeMount, no checksum/config roll annotation. These would all still pass
# `helm template`; these assertions catch a regression that re-introduces them.
templates:
  - templates/deployment.yaml
tests:
  - it: does not pass the deprecated --config-path flag
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --config-path=/etc/node-rotation/policy.yaml

  - it: mounts no policy ConfigMap volume
    asserts:
      - isNull:
          path: spec.template.spec.volumes
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts

  - it: carries no checksum/config roll annotation
    asserts:
      - isNull:
          path: spec.template.metadata.annotations
