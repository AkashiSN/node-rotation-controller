suite: RotationPolicy sample (spec §5.4, issue #119)
# Asserts the chart ships a cluster-scoped RotationPolicy carrying the sample
# policy, gated by rotationPolicy.create. The CRD itself lives in crds/ (applied
# by Helm before templates); this suite covers only the sample CR object.
templates:
  - templates/rotationpolicy.yaml
tests:
  - it: renders a cluster-scoped RotationPolicy with the sample spec by default
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: noderotation.io/v1alpha1
      - equal:
          path: kind
          value: RotationPolicy
      # cluster-scoped: never release-namespaced
      - isNull:
          path: metadata.namespace
      # name defaults to the chart fullname
      - equal:
          path: metadata.name
          value: RELEASE-NAME-node-rotation-controller
      - equal:
          path: spec.nodePoolSelector.matchLabels.workload
          value: api
      - equal:
          path: spec.ageThreshold
          value: auto
      - equal:
          path: spec.minRotationChances
          value: 2
      # v1 is surge-only and serial
      - equal:
          path: spec.surge.maxUnavailable
          value: 1
      - equal:
          path: spec.prePull.enabled
          value: false

  - it: is not rendered when rotationPolicy.create is false
    set:
      rotationPolicy.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: honors an explicit rotationPolicy.name
    set:
      rotationPolicy.name: api
    asserts:
      - equal:
          path: metadata.name
          value: api

  # Issue #153: a list of policies in `rotationPolicies` renders one
  # cluster-scoped RotationPolicy per entry (per-NodePool differentiation).
  - it: renders one RotationPolicy per rotationPolicies entry
    set:
      rotationPolicies:
        - name: api
          spec:
            nodePoolSelector:
              matchLabels: { mise: non_batch }
            ageThreshold: 240h
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Sat], start: "02:00", end: "06:00" }
            surge: { maxUnavailable: 1 }
        - name: batch
          spec:
            nodePoolSelector:
              matchLabels: { mise: batch_only }
            ageThreshold: 168h
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Sun], start: "03:00", end: "05:00" }
            surge: { maxUnavailable: 1 }
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: api
        documentIndex: 0
      - isNull:
          path: metadata.namespace
        documentIndex: 0
      - equal:
          path: spec.nodePoolSelector.matchLabels.mise
          value: non_batch
        documentIndex: 0
      - equal:
          path: spec.ageThreshold
          value: 240h
        documentIndex: 0
      - equal:
          path: metadata.name
          value: batch
        documentIndex: 1
      - equal:
          path: spec.nodePoolSelector.matchLabels.mise
          value: batch_only
        documentIndex: 1
      - equal:
          path: spec.ageThreshold
          value: 168h
        documentIndex: 1

  # rotationPolicies (plural) wins when both are set; the singular sample is
  # ignored so existing values keep working only when the list is empty.
  - it: rotationPolicies takes precedence over the singular rotationPolicy
    set:
      rotationPolicy:
        create: true
        name: legacy
      rotationPolicies:
        - name: only
          spec:
            nodePoolSelector:
              matchLabels: { workload: api }
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Sat], start: "02:00", end: "06:00" }
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: only

  # A per-entry create:false skips just that entry (parity with the singular).
  - it: skips a rotationPolicies entry with create false
    set:
      rotationPolicies:
        - name: kept
          spec:
            nodePoolSelector:
              matchLabels: { workload: api }
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Sat], start: "02:00", end: "06:00" }
        - name: dropped
          create: false
          spec:
            nodePoolSelector:
              matchLabels: { workload: batch }
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Sun], start: "03:00", end: "05:00" }
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: kept
