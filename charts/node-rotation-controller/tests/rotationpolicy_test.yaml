suite: RotationPolicy sample (spec §5.4, issue #119)
# Asserts the chart ships a cluster-scoped RotationPolicy carrying the sample
# policy, from the single-entry rotationPolicies default. The CRD itself lives in
# crds/ (applied by Helm before templates); this suite covers only the CR objects.
templates:
  - templates/rotationpolicy.yaml
tests:
  - it: renders a cluster-scoped RotationPolicy with the sample spec by default
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: noderotation.io/v1alpha1
      - equal:
          path: kind
          value: RotationPolicy
      # cluster-scoped: never release-namespaced
      - isNull:
          path: metadata.namespace
      # name defaults to the chart fullname
      - equal:
          path: metadata.name
          value: RELEASE-NAME-node-rotation-controller
      - equal:
          path: spec.nodePoolSelector.matchLabels.workload
          value: api
      - equal:
          path: spec.ageThreshold
          value: auto
      - equal:
          path: spec.minRotationChances
          value: 2
      # v1 is surge-only and serial
      - equal:
          path: spec.surge.maxUnavailable
          value: 1
      # ADR-0001: the surge-less forceful fallback is opt-in, off by default
      - equal:
          path: spec.surge.forcefulFallback.enabled
          value: false
      - equal:
          path: spec.prePull.enabled
          value: false

  # Issue #196: the removed singular `rotationPolicy` must fail loudly. The values
  # schema does not seal the root object, so without the guard a stale key would be
  # silently ignored — and a user who had set create=false would get the default
  # sample policy installed over a cluster that deliberately had none.
  - it: fails loudly on the removed singular rotationPolicy
    set:
      rotationPolicy:
        create: false
    asserts:
      - failedTemplate:
          errorMessage: 'values: `rotationPolicy` was removed in chart 0.5.0 (issue #196); use the `rotationPolicies` list instead — `rotationPolicy: {create: true, name: X, spec: {...}}` becomes `rotationPolicies: [{name: X, spec: {...}}]`, and `rotationPolicy: {create: false}` becomes `rotationPolicies: []`'

  # Bring-your-own-policies: an empty list renders nothing, so the user's own
  # out-of-band RotationPolicy objects are the only ones in the cluster.
  - it: is not rendered when rotationPolicies is empty
    set:
      rotationPolicies: []
    asserts:
      - hasDocuments:
          count: 0

  - it: honors an explicit name on a single-entry list
    set:
      rotationPolicies:
        - name: api
          spec:
            nodePoolSelector:
              matchLabels: { workload: api }
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Sat], start: "02:00", end: "06:00" }
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: api

  # Issue #153: a list of policies in `rotationPolicies` renders one
  # cluster-scoped RotationPolicy per entry (per-NodePool differentiation).
  - it: renders one RotationPolicy per rotationPolicies entry
    set:
      rotationPolicies:
        - name: api
          spec:
            nodePoolSelector:
              matchLabels: { mise: non_batch }
            ageThreshold: 240h
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Sat], start: "02:00", end: "06:00" }
            surge: { maxUnavailable: 1 }
        - name: batch
          spec:
            nodePoolSelector:
              matchLabels: { mise: batch_only }
            ageThreshold: 168h
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Sun], start: "03:00", end: "05:00" }
            surge: { maxUnavailable: 1 }
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: api
        documentIndex: 0
      - isNull:
          path: metadata.namespace
        documentIndex: 0
      - equal:
          path: spec.nodePoolSelector.matchLabels.mise
          value: non_batch
        documentIndex: 0
      - equal:
          path: spec.ageThreshold
          value: 240h
        documentIndex: 0
      - equal:
          path: metadata.name
          value: batch
        documentIndex: 1
      - equal:
          path: spec.nodePoolSelector.matchLabels.mise
          value: batch_only
        documentIndex: 1
      - equal:
          path: spec.ageThreshold
          value: 168h
        documentIndex: 1

  # An entry that omits `name` falls back to the chart fullname — the property the
  # default single-entry list relies on, pinned here against an explicit list.
  - it: falls back to the chart fullname when an entry omits name
    set:
      rotationPolicies:
        - spec:
            nodePoolSelector:
              matchLabels: { workload: api }
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Sat], start: "02:00", end: "06:00" }
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-node-rotation-controller

  # A per-entry create:false skips just that entry.
  - it: skips a rotationPolicies entry with create false
    set:
      rotationPolicies:
        - name: kept
          spec:
            nodePoolSelector:
              matchLabels: { workload: api }
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Sat], start: "02:00", end: "06:00" }
        - name: dropped
          create: false
          spec:
            nodePoolSelector:
              matchLabels: { workload: batch }
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Sun], start: "03:00", end: "05:00" }
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: kept

  # Issue #212: surge.drainEstimate is an advisory input to the layer-2
  # throughput forecast only — it changes no rotation timing and is rendered
  # verbatim like any other surge field.
  - it: renders an explicit surge.drainEstimate when set
    set:
      rotationPolicies:
        - name: p
          spec:
            nodePoolSelector:
              matchLabels: { workload: api }
            maintenanceWindows:
              - timezone: Asia/Tokyo
                days: [Wed]
                start: "02:00"
                end: "06:00"
            surge:
              drainEstimate: 20m
    asserts:
      - equal:
          path: spec.surge.drainEstimate
          value: 20m

  # Unset resolves in the controller to min(terminationGracePeriod, 10m); the
  # chart must not inject a default that would turn every install into an
  # explicit setting (see values.yaml comment on surge.drainEstimate).
  - it: leaves surge.drainEstimate unset by default so the controller resolves min(tGP, 10m)
    asserts:
      - notExists:
          path: spec.surge.drainEstimate

  # Issue #220: surge.provisioningEstimate is an advisory input to the layer-2
  # throughput forecast only — it changes no rotation timing and is rendered
  # verbatim like any other surge field (mirrors drainEstimate, ADR-0003).
  - it: renders an explicit surge.provisioningEstimate when set
    set:
      rotationPolicies:
        - name: p
          spec:
            nodePoolSelector:
              matchLabels: { workload: api }
            maintenanceWindows:
              - timezone: Asia/Tokyo
                days: [Wed]
                start: "02:00"
                end: "06:00"
            surge:
              provisioningEstimate: 3m
    asserts:
      - equal:
          path: spec.surge.provisioningEstimate
          value: 3m

  # Unset resolves in the controller to min(readyTimeout, 5m); like drainEstimate
  # the chart must not inject a default (see values.yaml comment on
  # surge.provisioningEstimate).
  - it: leaves surge.provisioningEstimate unset by default so the controller resolves min(readyTimeout, 5m)
    asserts:
      - notExists:
          path: spec.surge.provisioningEstimate

  # Issue #216 / ADR-0004: surge.failurePause is the post-failure inter-attempt pause
  # (gate B), split off cooldownAfter. Rendered verbatim like any other surge field.
  - it: renders an explicit surge.failurePause when set
    set:
      rotationPolicies:
        - name: p
          spec:
            nodePoolSelector:
              matchLabels: { workload: api }
            maintenanceWindows:
              - timezone: Asia/Tokyo
                days: [Wed]
                start: "02:00"
                end: "06:00"
            surge:
              failurePause: 20m
    asserts:
      - equal:
          path: spec.surge.failurePause
          value: 20m

  # Unset resolves in the controller to max(10m, cooldownAfter); the chart must not
  # inject a default (admission cannot compute max() across fields).
  - it: leaves surge.failurePause unset by default so the controller resolves max(10m, cooldownAfter)
    asserts:
      - notExists:
          path: spec.surge.failurePause

  # Issue #219: the RotationPolicy value subtree is sealed with
  # additionalProperties:false, so a typo'd key is rejected at render time
  # instead of being silently dropped by the CRD's structural schema. helm
  # unittest evaluates values.schema.json, so these cases exercise the seal.
  #
  # The schema error is raised while values are loaded (before template render),
  # which helm unittest surfaces as a bare template failure — a `failedTemplate`
  # with an `errorMessage:` matcher records the case as errored rather than
  # matching, so these assert the failure without pinning the message. The paired
  # valid-key case guards against over-sealing (a false positive that fails every
  # install). The `helm template` negative control in the PR checks the exact
  # "additional properties '<key>' not allowed" text.
  - it: rejects a typo'd surge key (surge is sealed)
    set:
      rotationPolicies:
        - name: p
          spec:
            nodePoolSelector:
              matchLabels: { workload: api }
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Wed], start: "02:00", end: "06:00" }
            surge:
              readyTimout: 15m
    asserts:
      - failedTemplate: {}

  - it: rejects a typo'd maintenanceWindows key (each window entry is sealed)
    set:
      rotationPolicies:
        - name: p
          spec:
            nodePoolSelector:
              matchLabels: { workload: api }
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Wed], start: "02:00", end: "06:00", tz: x }
    asserts:
      - failedTemplate: {}

  - it: accepts every sealed object populated with its legitimate keys
    set:
      rotationPolicies:
        - name: p
          spec:
            nodePoolSelector:
              matchLabels: { workload: api }
              matchExpressions:
                - { key: role, operator: In, values: [worker] }
            ageThreshold: 168h
            minRotationChances: 2
            maintenanceWindows:
              - { timezone: Asia/Tokyo, days: [Wed, Sat], start: "02:00", end: "06:00" }
            surge:
              maxUnavailable: 1
              readyTimeout: 15m
              cooldownAfter: 10m
              failurePause: 20m
              drainEstimate: 20m
              provisioningEstimate: 3m
              retryBackoff: 30m
              matchNodeRequirements:
                required: [topology.kubernetes.io/zone]
                preferred: []
              forcefulFallback:
                enabled: true
            prePull:
              enabled: false
    asserts:
      - notFailedTemplate: {}
      - equal:
          path: spec.surge.drainEstimate
          value: 20m
      - equal:
          path: spec.surge.provisioningEstimate
          value: 3m
      - equal:
          path: spec.surge.failurePause
          value: 20m
      - equal:
          path: spec.surge.forcefulFallback.enabled
          value: true
