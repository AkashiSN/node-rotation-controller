# Default values for node-rotation-controller.
# This is a YAML-formatted file.

# -- Number of controller replicas. v1 runs 2 with leader election (1 active),
# so a node drain or crash never leaves the cluster un-reconciled (spec §5.1).
replicaCount: 2

image:
  # -- Controller image repository.
  repository: ghcr.io/akashisn/node-rotation-controller
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Image tag. Defaults to the chart appVersion when empty.
  tag: ""

# -- Image pull secrets for the controller image.
imagePullSecrets: []
# -- Override the chart name portion of resource names.
nameOverride: ""
# -- Override the full name of chart resources.
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount for the controller.
  create: true
  # -- Annotations for the ServiceAccount (e.g. an IRSA role ARN — note v1 needs
  # no cloud IAM, all node ops route through Karpenter, spec §4.3).
  annotations: {}
  # -- ServiceAccount name. Generated from the fullname when empty.
  name: ""

# -- Extra annotations for the controller Pod.
podAnnotations: {}
# -- Extra labels for the controller Pod.
podLabels: {}

# -- Pod-level security context. Aligns with the distroless nonroot image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Controller resource requests/limits. The controller is light; surge nodes
# are the real cost (spec §4.4).
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# -- Node selector for the controller Pod.
nodeSelector: {}
# -- Tolerations for the controller Pod.
tolerations: []
# -- Affinity for the controller Pod.
affinity: {}
# -- Topology spread constraints for the controller Pod.
topologySpreadConstraints: []

metrics:
  service:
    # -- Create a ClusterIP Service exposing the /metrics endpoint (spec §4.2).
    enabled: true
    # -- The metrics Service type.
    type: ClusterIP
    # -- The metrics Service port.
    port: 8080
  serviceMonitor:
    # -- Create a Prometheus Operator ServiceMonitor. Requires the
    # monitoring.coreos.com/v1 CRD; left off so a cluster without it still
    # renders.
    enabled: false
    # -- Scrape interval.
    interval: 30s
    # -- Scrape timeout.
    scrapeTimeout: 10s
    # -- Extra labels for the ServiceMonitor (e.g. a Prometheus release selector).
    labels: {}

# Optional Prometheus Operator PrometheusRule shipping the spec §4.2 alerts.
# Requires the monitoring.coreos.com/v1 CRD; left OFF by default so existing
# installs and clusters without the operator still render. The `for`,
# `severity`, and range knobs let you tune each alert to your schedule
# (especially the window-period-dependent ones) without editing the template.
# See the production runbook (docs/runbook.md) for how to read the metrics.
prometheusRule:
  # -- Create a PrometheusRule with the seven §4.2 alerts.
  enabled: false
  # -- Extra labels for the PrometheusRule (e.g. a Prometheus release selector).
  labels: {}
  # noderotation_completed_total{outcome=~"failure|expired"} increased in the
  # last hour — a rotation failed or a node was force-expired (spec §3.5).
  completedFailure:
    for: 0m
    severity: warning
  # Eligible candidates have not cleared across two consecutive windows. Set
  # `windowRange` to roughly two window periods (2·P) for your schedule so the
  # min_over_time spans both (spec §4.2, R2).
  candidatesNotDraining:
    windowRange: 8d
    for: 0m
    severity: warning
  # The maintenance window is active with candidates but zero completions — the
  # in-window rotation appears wedged. `completionRange` should cover roughly a
  # full window's duration (spec §4.2).
  stalledInWindow:
    completionRange: 4h
    for: 30m
    severity: warning
  # The in-flight drain has exceeded tGP + buffer — a blocking PDB or stuck
  # finalizer (spec §5.2). The serial gate is held until it clears.
  drainStuck:
    for: 0m
    severity: warning
  # NodeClaims whose own stamped expireAfter can no longer guarantee K rotation
  # chances (spec §3.2 layer 3).
  shortLeadNodes:
    for: 0m
    severity: warning
  # The same rotation keeps failing (retry-count >= 3) — a systematic cause such
  # as sustained placeholder preemption or a same-AZ capacity shortage (R3).
  retryCountHigh:
    for: 0m
    severity: warning
  # A window-bounded forceful fallback fired (spec §3.3, ADR-0001). Per ADR-0001
  # a single fallback is the designed outcome for a synchronized batch too large
  # to rotate gracefully, so this ships as an info-level visibility signal, not a
  # page. Tighten it for your environment (e.g. a sustained rate at `warning`).
  forcefulFallback:
    for: 0m
    severity: info

podDisruptionBudget:
  # -- Create a PodDisruptionBudget for the controller. With replicaCount=2 and
  # minAvailable=1 a node drain cannot take out both replicas at once, so a
  # leader survives (R1 mitigation, spec §7.1).
  enabled: true
  # -- minAvailable for the controller PDB.
  minAvailable: 1

# Surge placeholder Pod settings (spec §3.3). These wire the controller's
# --placeholder-image and --priority-class flags AND install the matching
# PriorityClass, so the two never drift.
placeholder:
  # -- The pause image the surge placeholder Pod runs (spec §3.3).
  image: registry.k8s.io/pause:3.10
  priorityClass:
    # -- Install the dedicated negative-priority PriorityClass. Disable only if
    # you manage it out-of-band; the controller does NOT create it (spec §4.3).
    # NOTE: this is a cluster-scoped object with a fixed name (it must match the
    # controller's --priority-class flag), so it is NOT release-scoped. v1 assumes
    # a single install per cluster; a second release would collide on this object
    # (set create=false on additional releases and share the one PriorityClass).
    create: true
    # -- PriorityClass name. Must match the controller's --priority-class flag.
    name: noderotation-placeholder
    # -- Priority value. Negative so the placeholder is the deliberate preemption
    # victim, below normal workloads at 0 (spec §3.3).
    value: -10

# -- Controller log settings, passed to zap.
logging:
  # -- Enable development-mode (human-readable) logging. Production uses JSON.
  development: false

# Cluster-scoped RotationPolicy objects (spec §5.4, issues #119 and #153). The
# controller resolves each NodePool's governing RotationPolicy at reconcile time.
# One entry renders one RotationPolicy, so different NodePools can get different
# rotation behavior — a different maintenance window, ageThreshold, or surge per
# pool — without installing the chart (and the controller Deployment) more than
# once. Everything under an entry's `spec` is the RotationPolicy spec rendered
# verbatim via toYaml, so --set works on any field and the values schema
# validates the result. Set this to [] to author your own RotationPolicy objects
# out-of-band (one per divergent policy).
# Selector overlap needs no chart-side guard: the controller picks a single
# governing policy per NodePool by selector specificity and treats an
# equal-specificity tie as a hard PolicyConflict (spec §5.4).
# -- List of RotationPolicy objects, one per entry. Each is
# `{name, spec, [create]}`; an explicit `create: false` skips that entry. These
# objects are cluster-scoped, so `name` must be unique; an entry that omits it
# falls back to the chart fullname, which only a single-entry list can rely on.
# The default below is a sample single-entry list — point it at your NodePools.
# Example of the multi-policy form:
#   rotationPolicies:
#     - name: api
#       spec:
#         nodePoolSelector:
#           matchLabels: { workload: api }
#         maintenanceWindows:
#           - { timezone: Asia/Tokyo, days: [Sat], start: "02:00", end: "06:00" }
#     - name: batch
#       spec:
#         nodePoolSelector:
#           matchLabels: { workload: batch }
#         ageThreshold: 168h
#         maintenanceWindows:
#           - { timezone: Asia/Tokyo, days: [Sun], start: "03:00", end: "05:00" }
rotationPolicies:
  - spec:
      # NodePools this policy governs, matched by label (spec §3.2, §5.4). A
      # standard label selector (matchLabels and/or matchExpressions). A NodePool
      # matched by no RotationPolicy is not rotated (its expireAfter backstop still
      # applies); an equal-specificity tie between policies is a hard error.
      nodePoolSelector:
        matchLabels:
          # example; adjust to your NodePool labels
          workload: api

      # Derived per NodePool (spec §3.2). An explicit Go duration override is
      # allowed but still validated (recomputed G < 1 is fatal, G < K warns).
      ageThreshold: auto
      # K; floor 1, values < 2 only warn (spec §3.2).
      minRotationChances: 2

      # The effective window is the UNION of all entries (spec §3.1), per policy.
      maintenanceWindows:
        - timezone: Asia/Tokyo
          days: [Wed, Sat]
          start: "02:00"
          end: "06:00"

      surge:
        # v1 fixed at 1 (serial); > 1 reserved for a later version.
        maxUnavailable: 1
        # Surge node must reach Ready within this, else the attempt fails.
        readyTimeout: 15m
        # Settle pause between rotations; also the post-failure inter-attempt
        # pause (spec §5.2 / §4.4).
        cooldownAfter: 10m
        # Base wait before re-selecting a failed NodeClaim; doubles per
        # consecutive failure, capped at 8x (spec §5.3).
        retryBackoff: 30m
        # Expected duration of a healthy, PDB-respecting drain. Feeds ONLY the
        # layer-2 throughput forecast (spec §3.2) — it is not a bound, and it
        # changes no rotation timing. Leave it unset and the controller uses
        # min(terminationGracePeriod, 10m).
        #
        # Set it ONLY if you know your workload's real drain time. Do NOT lower
        # terminationGracePeriod to "fix" a throughput warning: that is the
        # deadline at which Karpenter force-kills a drain, not how long a healthy
        # one takes.
        # drainEstimate: 10m
        # Expected duration of a healthy surge provisioning (candidate created →
        # new node Ready). Feeds ONLY the layer-2 throughput forecast (spec §3.2,
        # ADR-0003) — it is not a bound, and it changes no rotation timing. Leave it
        # unset and the controller uses min(readyTimeout, 5m).
        #
        # Set it ONLY if you know your cluster's real provisioning time. Do NOT lower
        # readyTimeout to "fix" a throughput warning: that is the deadline the surge
        # attempt is abandoned at, not how long a healthy provision takes.
        # provisioningEstimate: 5m
        # Which candidate-node requirements the placeholder replicates (spec §3.3).
        # The karpenter.sh/nodepool selector is always applied and is NOT listed.
        matchNodeRequirements:
          required:
            - topology.kubernetes.io/zone
            - kubernetes.io/arch
            - karpenter.sh/capacity-type
          preferred: []
        # Opt-in, default off (spec §3.3, ADR-0001). When a candidate cannot
        # finish a graceful surge before its own expireAfter deadline, rotate it
        # surge-less inside the window — deleting the NodeClaim via the same
        # voluntary, PDB-respecting path — instead of letting Karpenter force-
        # expire it at an uncontrolled time. Watch
        # noderotation_forceful_fallback_total when you enable this.
        forcefulFallback:
          enabled: false

      # v2 (disabled in v1). The v1 parser accepts only `enabled` here; the
      # images list lands when pre-pull ships (spec §6.2 roadmap).
      prePull:
        enabled: false
