{{- /*
RotationPolicy objects (spec §5.4, issues #119 and #153). The controller resolves
each NodePool's governing RotationPolicy at reconcile time.

Two ways to define policies, mutually exclusive:
  - rotationPolicies (LIST): one RotationPolicy per entry, for per-NodePool
    differentiation (a different maintenance window / ageThreshold / surge per
    pool). Each entry is {name, spec, [create]}; an explicit `create: false`
    skips just that entry.
  - rotationPolicy (SINGULAR): the sample object. Used ONLY when rotationPolicies
    is empty, so existing values keep working unchanged.
The list wins when non-empty; the singular sample is then ignored.

These objects are cluster-scoped (NodePools are cluster-scoped), so they are NOT
release-namespaced. The CRD ships in the chart's crds/ directory, which Helm
applies before these templated resources, so they are admitted on first install.
Overlap between selectors needs no chart-side guard: the controller resolves a
single governing policy per NodePool by selector specificity and treats an
equal-specificity tie as a hard PolicyConflict (spec §5.4).
*/ -}}
{{- $policies := list -}}
{{- if .Values.rotationPolicies -}}
  {{- range .Values.rotationPolicies -}}
    {{- if or (not (hasKey . "create")) .create -}}
      {{- $policies = append $policies . -}}
    {{- end -}}
  {{- end -}}
{{- else if .Values.rotationPolicy.create -}}
  {{- $policies = append $policies .Values.rotationPolicy -}}
{{- end -}}
{{- range $policies }}
---
apiVersion: noderotation.io/v1alpha1
kind: RotationPolicy
metadata:
  # v1 assumes a single install per cluster; a second release would collide on
  # these cluster-scoped names. The singular falls back to the chart fullname;
  # list entries must each carry a unique `name`.
  name: {{ .name | default (include "node-rotation-controller.fullname" $) }}
  labels:
    {{- include "node-rotation-controller.labels" $ | nindent 4 }}
spec:
  {{- toYaml .spec | nindent 2 }}
{{- end }}
