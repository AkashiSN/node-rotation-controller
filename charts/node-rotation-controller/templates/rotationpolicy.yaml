{{- /*
RotationPolicy objects (spec §5.4, issues #119 and #153). The controller resolves
each NodePool's governing RotationPolicy at reconcile time.

Policies come from the rotationPolicies LIST: one RotationPolicy per entry, for
per-NodePool differentiation (a different maintenance window / ageThreshold /
surge per pool). Each entry is {name, spec, [create]}; an explicit `create: false`
skips just that entry, and an empty list renders nothing (bring your own objects).

These objects are cluster-scoped (NodePools are cluster-scoped), so they are NOT
release-namespaced. The CRD ships in the chart's crds/ directory, which Helm
applies before these templated resources, so they are admitted on first install.
Overlap between selectors needs no chart-side guard: the controller resolves a
single governing policy per NodePool by selector specificity and treats an
equal-specificity tie as a hard PolicyConflict (spec §5.4).
*/ -}}
{{- /*
The singular `rotationPolicy` was removed in 0.5.0 (issue #196). Nothing else
would notice a leftover one: the values schema does not seal the root object, so
a stale `rotationPolicy: {create: false}` would be silently ignored and this
chart would install its default sample policy over a cluster that deliberately
had none. Fail loudly instead, with the migration.
*/ -}}
{{- if hasKey .Values "rotationPolicy" -}}
  {{- fail "values: `rotationPolicy` was removed in chart 0.5.0 (issue #196); use the `rotationPolicies` list instead — `rotationPolicy: {create: true, name: X, spec: {...}}` becomes `rotationPolicies: [{name: X, spec: {...}}]`, and `rotationPolicy: {create: false}` becomes `rotationPolicies: []`" -}}
{{- end -}}
{{- $policies := list -}}
{{- range .Values.rotationPolicies -}}
  {{- if or (not (hasKey . "create")) .create -}}
    {{- $policies = append $policies . -}}
  {{- end -}}
{{- end -}}
{{- range $policies }}
---
apiVersion: noderotation.io/v1alpha1
kind: RotationPolicy
metadata:
  # v1 assumes a single install per cluster; a second release would collide on
  # these cluster-scoped names. An entry that omits `name` falls back to the chart
  # fullname, which only a single-entry list can rely on — a multi-entry list must
  # name every entry, uniquely.
  name: {{ .name | default (include "node-rotation-controller.fullname" $) }}
  labels:
    {{- include "node-rotation-controller.labels" $ | nindent 4 }}
spec:
  {{- toYaml .spec | nindent 2 }}
{{- end }}
