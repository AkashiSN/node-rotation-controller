apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "node-rotation-controller.fullname" . }}
  labels:
    {{- include "node-rotation-controller.labels" . | nindent 4 }}
# Cluster-scoped resources, plus the cluster-wide pods read the headroom gate
# needs (spec §4.3). Namespaced writes (placeholder pods create/delete, leases,
# leader-election core/v1 Events) are granted via a namespaced Role so they stay
# in the controller namespace. The issue #50 warning Events use the new
# events.k8s.io API and are granted cluster-wide here because the controller
# records them on cluster-scoped NodePool/NodeClaim objects, whose Events land in
# the "default" namespace.
rules:
  - apiGroups: ["karpenter.sh"]
    resources: ["nodeclaims"]
    # No create: v1 never creates a NodeClaim (spec §3.3). update/patch carry the
    # noderotation.io/* state annotations; delete drives rotation and the failure reap.
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["karpenter.sh"]
    resources: ["nodepools"]
    # update/patch: the active-rotation anchor, active-rotation-state mirror,
    # last-rotation-at and last-failure-at annotations (spec §5.2/§5.3).
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    # update/patch: do-not-disrupt / do-not-disrupt-owned / surge-for / cordoned
    # annotations + spec.unschedulable. The controller mutates Nodes via full-object Update
    # under retry-on-conflict (patchNode), the same read-modify-write path used
    # for nodeclaims/nodepools, so update is required alongside patch.
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    # get/list/watch must be cluster-wide: the headroom gate sums the
    # reschedulable Pod requests on the candidate node, and those Pods live in
    # arbitrary namespaces (spec §3.3). The manager cache also watches Pods
    # cluster-wide. create/delete (placeholder Pods) stay in the namespaced Role.
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    # Cluster-wide: the controller records Warning Events on the cluster-scoped
    # NodePool and NodeClaim objects (issue #50) via the new events.k8s.io API
    # (mgr.GetEventRecorder). client-go writes a cluster-scoped object's Event into
    # the "default" namespace, so a namespaced Role would not authorize it.
    verbs: ["create", "patch"]
  - apiGroups: ["noderotation.io"]
    resources: ["rotationpolicies"]
    # The controller resolves each NodePool's governing RotationPolicy at reconcile
    # time and watches them for changes (spec §5.4, issue #119). Read-only here;
    # status writes (rotationpolicies/status) are granted when #124 populates them.
    verbs: ["get", "list", "watch"]
