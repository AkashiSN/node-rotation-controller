---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: rotationpolicies.noderotation.io
spec:
  group: noderotation.io
  names:
    kind: RotationPolicy
    listKind: RotationPolicyList
    plural: rotationpolicies
    shortNames:
    - rotpol
    singular: rotationpolicy
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.ageThreshold
      name: Age-Threshold
      type: string
    - jsonPath: .status.matchedNodePools
      name: Matched
      type: integer
    - jsonPath: .status.rotatingNodePools
      name: Rotating
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RotationPolicy is a cluster-scoped rotation policy governing the NodePools its
          selector matches (issue #119).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              spec is required: it carries the mandatory nodePoolSelector and
              maintenanceWindows whose admission-time guarantees would be bypassed by an
              empty object if spec itself were optional.
            properties:
              ageThreshold:
                default: auto
                description: |-
                  ageThreshold is "auto" (derived per NodePool, spec §3.2) or an explicit Go
                  duration override (e.g. "120h"); an override is still validated (recomputed
                  G < 1 is fatal, G < K warns).
                pattern: ^(auto|([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h))+)$
                type: string
              maintenanceWindows:
                description: |-
                  maintenanceWindows is the per-policy list of recurrence entries; the effective
                  window is the UNION of all entries (spec §3.1).
                items:
                  description: |-
                    MaintenanceWindow is one recurrence entry; the effective window is the union of
                    all entries in a policy (spec §3.1).
                  properties:
                    days:
                      description: days is the set of ISO weekdays the window recurs
                        on.
                      items:
                        enum:
                        - Mon
                        - Tue
                        - Wed
                        - Thu
                        - Fri
                        - Sat
                        - Sun
                        type: string
                      minItems: 1
                      type: array
                    end:
                      description: |-
                        end is the window close time, "HH:MM" 24-hour; must be after start (no
                        overnight wrap — split into two entries). Structural ordering is validated at
                        runtime (spec §5.4).
                      pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
                      type: string
                    start:
                      description: start is the window open time, "HH:MM" 24-hour.
                      pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
                      type: string
                    timezone:
                      description: timezone is an IANA tz database name (e.g. "Asia/Tokyo").
                      minLength: 1
                      type: string
                  required:
                  - days
                  - end
                  - start
                  - timezone
                  type: object
                minItems: 1
                type: array
              minRotationChances:
                default: 2
                description: |-
                  minRotationChances is K: the number of full maintenance windows a candidate
                  should be eligible for before its expireAfter backstop fires (spec §3.2).
                  Floor 1; values < 2 only warn.
                format: int32
                minimum: 1
                type: integer
              nodePoolSelector:
                description: |-
                  nodePoolSelector selects the NodePools this policy governs. A NodePool matched
                  by no policy is not rotated (the expireAfter backstop still applies). When
                  multiple policies match one NodePool, conflict resolution applies (spec §5.4).
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              prePull:
                description: |-
                  prePull is the reserved v2 expansion point; only enabled:false is accepted in v1.
                  The CEL rule enforces the v1 reservation at admission time, mirroring the
                  ConfigMap validator (internal/policy.Validate), so enabling it is rejected
                  rather than silently honored by a controller that deletes nodes.
                properties:
                  enabled:
                    default: false
                    description: enabled turns the feature on. Reserved features must
                      stay false in v1.
                    type: boolean
                type: object
                x-kubernetes-validations:
                - message: 'prePull is reserved for v2 and must be disabled (enabled:
                    false) in v1'
                  rule: '!self.enabled'
              surge:
                description: surge holds the v1 surge-orchestration knobs (spec §3.3,
                  §5.4).
                properties:
                  cooldownAfter:
                    default: 10m
                    description: |-
                      cooldownAfter is the settle pause between consecutive rotations in a window,
                      also reused as the pool-level inter-attempt pause after a failed attempt
                      (spec §5.2); must be positive (validated at runtime).
                    type: string
                  forcefulFallback:
                    description: |-
                      forcefulFallback is the opt-in window-bounded surge-less forceful fallback
                      (spec §3.3, ADR-0001). When enabled, a candidate that cannot complete a
                      graceful surge before its own deadline is rotated surge-less: the controller
                      deletes the old NodeClaim in-window without the surge, still via the
                      voluntary path (PDBs apply), instead of letting expireAfter fire at an
                      uncontrolled time. Default off keeps the surge-only behavior.
                    properties:
                      enabled:
                        default: false
                        description: enabled turns the feature on. Reserved features
                          must stay false in v1.
                        type: boolean
                    type: object
                  matchNodeRequirements:
                    description: |-
                      matchNodeRequirements selects which candidate-node requirements the
                      placeholder Pod replicates (spec §3.3).
                    properties:
                      preferred:
                        description: preferred is the soft nodeAffinity, relaxed under
                          capacity pressure.
                        items:
                          type: string
                        type: array
                      required:
                        description: |-
                          required is the hard nodeAffinity copied from the candidate node. Defaulted to
                          the §5.4 set (zone, arch, capacity-type) when empty; defaulting is applied at
                          runtime so an explicit empty list and an unset list remain distinguishable.
                        items:
                          type: string
                        type: array
                    type: object
                  maxUnavailable:
                    default: 1
                    description: maxUnavailable is fixed at 1 in v1 (serial per NodePool);
                      > 1 is reserved.
                    format: int32
                    maximum: 1
                    minimum: 1
                    type: integer
                  readyTimeout:
                    default: 15m
                    description: |-
                      readyTimeout is how long a surge node has to reach Ready before the attempt
                      fails; must be positive (validated at runtime).
                    type: string
                  retryBackoff:
                    default: 30m
                    description: |-
                      retryBackoff is the base wait before re-selecting a failed NodeClaim; doubles
                      per consecutive failure, capped at 8x (spec §5.3); must be positive.
                    type: string
                type: object
            required:
            - maintenanceWindows
            - nodePoolSelector
            type: object
          status:
            description: |-
              RotationPolicyStatus is an observational, derived view of the policy — never the
              authoritative runtime state. Per the architectural invariant, durable rotation
              state lives on NodeClaim/NodePool annotations and transient markers on Nodes and
              the placeholder Pod (spec §5.3); status is populated by a follow-up (#124).
            properties:
              conditions:
                description: conditions reports the policy's observed state (e.g.
                  a conflict that blocks rotation).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              matchedNodePools:
                description: matchedNodePools is the number of NodePools this policy
                  currently governs.
                format: int32
                type: integer
              observedGeneration:
                description: observedGeneration is the .metadata.generation the status
                  was last computed from.
                format: int64
                type: integer
              rotatingNodePools:
                description: |-
                  rotatingNodePools is the number of governed NodePools with an in-flight
                  rotation (the noderotation.io/active-rotation anchor set, spec §5.2/§5.3).
                  Observational only — derived from the NodePool anchors each pass, never the
                  source of truth.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
