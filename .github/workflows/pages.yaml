name: Pages
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'README.ja.md'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yaml'
      # The simulator page (issue #240) serves a wasm module built from these — a
      # change to internal/sim or cmd/wasm changes the page's behaviour, so it must
      # redeploy.
      - 'cmd/wasm/**'
      - 'internal/**'
      - 'api/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'aqua.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: aquaproj/aqua-installer@v4.0.5
        with:
          aqua_version: v2.62.1
          policy_allow: "true"
      - name: Cache Go + aqua tools
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.local/share/aquaproj-aqua
          key: pages-${{ runner.os }}-${{ hashFiles('go.sum', 'aqua.yaml') }}
          restore-keys: pages-${{ runner.os }}-
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm ci
      - run: npm run docs:build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
