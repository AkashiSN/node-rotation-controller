name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Classify the PR's changed paths so each required job can skip its heavy
  # steps when nothing it cares about changed — WITHOUT skipping the job itself
  # (a skipped required job hangs `pending` and blocks merge). Unlike e2e.yaml,
  # which folds detection into its single job to avoid a cross-job dependency,
  # this workflow's four jobs `needs:` a shared `changes` job (DRY: one
  # detection). To keep that fan-out safe, `changes` is itself a required status
  # check: it runs unconditionally on every PR, so it never hangs `pending`, and
  # if its self-test or classifier fails it surfaces as a clear red gate instead
  # of four silently-skipped required checks. On push to main every flag is true.
  # The classifier is unit-tested and run here on every CI invocation (cheap) so
  # it can never silently rot.
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.detect.outputs.go }}
      chart: ${{ steps.detect.outputs.chart }}
      docker: ${{ steps.detect.outputs.docker }}
      infra: ${{ steps.detect.outputs.infra }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the diff can reach the PR base commit.
          fetch-depth: 0
      - name: Self-test the change classifier
        run: bash .github/scripts/detect-ci-changes.test.sh
      - name: Detect changed paths
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "event=${{ github.event_name }} → running all jobs"
            printf 'go=true\nchart=true\ndocker=true\ninfra=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --name-only "$BASE_SHA" HEAD \
            | tee /dev/stderr \
            | bash .github/scripts/detect-ci-changes.sh >> "$GITHUB_OUTPUT"
          echo "--- classification ---"; cat "$GITHUB_OUTPUT"

  # The Go toolchain and every CLI come from aqua (aqua.yaml) — there is no
  # actions/setup-go. aqua-installer installs aqua and links the commands;
  # `make` lazily installs each pinned version (incl. go) on first use. The
  # cache persists the Go module/build cache and aqua's tool store across runs.
  lint:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v6
      - uses: aquaproj/aqua-installer@v4.0.4
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.infra == 'true'
        with:
          aqua_version: v2.60.1
          # Trust the committed aqua-policy.yaml so the local registry providing
          # controller-gen (aqua/registry.yaml) is allowed without interactive prompts.
          policy_allow: "true"
      - name: Cache Go + aqua tools
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.infra == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.local/share/aquaproj-aqua
          key: ci-${{ runner.os }}-${{ hashFiles('go.sum', 'aqua.yaml') }}
          restore-keys: ci-${{ runner.os }}-
      - name: golangci-lint
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.infra == 'true'
        run: make lint
      - name: gopls check (severity>=hint)
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.infra == 'true'
        run: make gopls-check
      - name: verify generated artifacts are up to date
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.infra == 'true'
        run: |
          make generate manifests
          git diff --exit-code -- api config charts/node-rotation-controller/crds || { \
            echo "::error::deepcopy/CRD manifests are stale (including the chart CRD copy) — run 'make generate manifests' and commit the result"; \
            exit 1; \
          }

  test:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v6
      - uses: aquaproj/aqua-installer@v4.0.4
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.infra == 'true'
        with:
          aqua_version: v2.60.1
          # Trust the committed aqua-policy.yaml so the local registry providing
          # controller-gen (aqua/registry.yaml) is allowed without interactive prompts.
          policy_allow: "true"
      - name: Cache Go + aqua tools
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.infra == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.local/share/aquaproj-aqua
          key: ci-${{ runner.os }}-${{ hashFiles('go.sum', 'aqua.yaml') }}
          restore-keys: ci-${{ runner.os }}-
      - if: needs.changes.outputs.go == 'true' || needs.changes.outputs.infra == 'true'
        run: make test

  build:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v6
      - uses: aquaproj/aqua-installer@v4.0.4
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
        with:
          aqua_version: v2.60.1
          # Trust the committed aqua-policy.yaml so the local registry providing
          # controller-gen (aqua/registry.yaml) is allowed without interactive prompts.
          policy_allow: "true"
      - name: Cache Go + aqua tools
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.local/share/aquaproj-aqua
          key: ci-${{ runner.os }}-${{ hashFiles('go.sum', 'aqua.yaml') }}
          restore-keys: ci-${{ runner.os }}-
      - if: needs.changes.outputs.go == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
        run: make build
      - uses: docker/setup-buildx-action@v4
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
      - name: Build container image (no push)
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false

  chart:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v6
      # helm is pinned in aqua.yaml (v4 line) and resolved from $PATH; the
      # helm-unittest plugin is installed into it below.
      - uses: aquaproj/aqua-installer@v4.0.4
        if: needs.changes.outputs.chart == 'true' || needs.changes.outputs.infra == 'true'
        with:
          aqua_version: v2.60.1
          # Trust the committed aqua-policy.yaml so the local registry providing
          # controller-gen (aqua/registry.yaml) is allowed without interactive prompts.
          policy_allow: "true"
      - name: helm lint
        if: needs.changes.outputs.chart == 'true' || needs.changes.outputs.infra == 'true'
        run: helm lint charts/node-rotation-controller
      - name: helm template (defaults)
        if: needs.changes.outputs.chart == 'true' || needs.changes.outputs.infra == 'true'
        run: helm template rot charts/node-rotation-controller --namespace node-rotation-system
      - name: helm template (ServiceMonitor enabled)
        if: needs.changes.outputs.chart == 'true' || needs.changes.outputs.infra == 'true'
        run: helm template rot charts/node-rotation-controller --namespace node-rotation-system --set metrics.serviceMonitor.enabled=true

      # Rendered-manifest content assertions (issue #75): prove the RBAC verb set
      # (§4.3) and the placeholder PriorityClass (§3.3) match the spec, not just
      # that the chart renders. Tests live in charts/node-rotation-controller/tests/.
      # `--verify=false` skips Helm 4's plugin provenance check (helm is pinned
      # to the v4 line in aqua.yaml; the helm-unittest release ships no .prov).
      - name: Install helm-unittest plugin
        if: needs.changes.outputs.chart == 'true' || needs.changes.outputs.infra == 'true'
        run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest --version v1.1.1
      - name: helm unittest (RBAC + PriorityClass assertions)
        if: needs.changes.outputs.chart == 'true' || needs.changes.outputs.infra == 'true'
        run: helm unittest charts/node-rotation-controller

      # values.schema.json negative cases (issue #75, §5.4): each invalid value
      # MUST be rejected by `helm template` (the schema is validated at render
      # time). Expected-to-fail renders — the step fails if any bad value renders.
      - name: values.schema.json rejects invalid values
        if: needs.changes.outputs.chart == 'true' || needs.changes.outputs.infra == 'true'
        run: |
          set -euo pipefail
          chart=charts/node-rotation-controller
          assert_rejected() {
            local desc="$1"; shift
            if helm template rot "$chart" "$@" >/dev/null 2>&1; then
              echo "FAIL: schema accepted invalid value: $desc ($*)" >&2
              exit 1
            fi
            echo "ok: rejected $desc"
          }
          # sanity: the defaults MUST render (guards against a broken assertion harness)
          helm template rot "$chart" >/dev/null
          echo "ok: defaults render"

          # rotationPolicies is a LIST, and Helm replaces list values whole: a
          # --set of one leaf drops the rest of the entry, so every case below
          # would be "rejected" for a missing required property no matter what the
          # rule under test says. Build a COMPLETE valid entry and perturb exactly
          # one field, so each rejection is attributable to the rule it pins.
          valid='"nodePoolSelector":{"matchLabels":{"workload":"api"}},"maintenanceWindows":[{"timezone":"UTC","days":["Sat"],"start":"02:00","end":"06:00"}]'
          entry() { printf '[{"spec":{%s%s}}]' "$valid" "${1-}"; }
          # sanity: the unperturbed entry MUST render, else every assertion below is vacuous
          helm template rot "$chart" --set-json "rotationPolicies=$(entry)" >/dev/null
          echo "ok: unperturbed policy entry renders"

          assert_rejected "surge.maxUnavailable=2 (v1 is serial, const 1)" \
            --set-json "rotationPolicies=$(entry ',"surge":{"maxUnavailable":2}')"
          assert_rejected "surge.readyTimeout=0s (must be a positive duration)" \
            --set-json "rotationPolicies=$(entry ',"surge":{"readyTimeout":"0s"}')"
          assert_rejected "prePull.enabled=true (v2 feature, const false in v1)" \
            --set-json "rotationPolicies=$(entry ',"prePull":{"enabled":true}')"
          assert_rejected "placeholder.priorityClass.value=0 (must be negative, max -1)" \
            --set placeholder.priorityClass.value=0
          # An unknown policy key must be rejected at render time, so a typo never
          # reaches the cluster as a RotationPolicy the CRD's OpenAPI schema would
          # reject at admission (or worse, prune silently). A policy entry's `spec`
          # is additionalProperties:false, mirroring the CRD's structural rules —
          # this guards against a silent regression.
          assert_rejected "rotationPolicies[].spec.<unknown> (additionalProperties:false)" \
            --set-json "rotationPolicies=$(entry ',"unknownKey":1')"
          # The entry itself is additionalProperties:false too, so a misspelled entry
          # key cannot pass through unnoticed.
          assert_rejected "rotationPolicies[].<unknown> (additionalProperties:false)" \
            --set-json "rotationPolicies=[{\"unknownKey\":1,\"spec\":{$valid}}]"
          # Issue #196: the removed singular `rotationPolicy` is not sealed away by
          # the schema (the root object allows unknown properties), so the template
          # fails on it explicitly rather than silently ignoring it.
          assert_rejected "the removed singular rotationPolicy (template fail)" \
            --set rotationPolicy.create=false
