name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make build
      - uses: docker/setup-buildx-action@v4
      - name: Build container image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false

  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: helm lint charts/node-rotation-controller
      - name: helm template (defaults)
        run: helm template rot charts/node-rotation-controller --namespace node-rotation-system
      - name: helm template (ServiceMonitor enabled)
        run: helm template rot charts/node-rotation-controller --namespace node-rotation-system --set metrics.serviceMonitor.enabled=true
