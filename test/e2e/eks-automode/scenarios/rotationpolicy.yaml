# The live rotation policy for the EKS Auto Mode PoC scenarios (issue #119): the
# controller resolves each NodePool's governing RotationPolicy at reconcile time.
# Apply this after the Helm install (the chart's crds/ installs the CRD first);
# controller-values.yaml sets rotationPolicies: [] so this is the only
# policy object in the cluster.
#
# Because the controller WATCHES the RotationPolicy, every knob here is changed
# LIVE with `kubectl patch rotationpolicy nrc-poc ...` — no `helm upgrade` and no
# controller restart. Scenarios C, L, and M Part B rely on this (they patch
# readyTimeout / maintenanceWindows live).
apiVersion: noderotation.io/v1alpha1
kind: RotationPolicy
metadata:
  name: nrc-poc
spec:
  # Match ONLY the dedicated nrc-poc pool by its marker label. The built-in
  # general-purpose/system pools (which host the controller itself) are out of
  # scope and are never rotated.
  nodePoolSelector:
    matchLabels:
      noderotation-poc/in-scope: "true"

  # Drive rotation by age, not by the per-claim expireAfter backstop. 5m keeps
  # each scenario brief yet leaves the fresh surge spare well below the threshold
  # for the whole rotation. NOTE: 5m is far below one daily window period
  # P=24h, so the controller emits expected non-fatal "AVeryAggressive" /
  # "ThroughputBelowArrival" findings — these are intentional for a fast test,
  # not errors (see SCENARIOS.md "Gotchas").
  ageThreshold: 5m
  minRotationChances: 2

  # Effectively always-open window (union of all entries, spec §3.1) so a
  # scenario never waits for a window edge. Scenario L patches this closed live.
  maintenanceWindows:
    - timezone: UTC
      days: [Mon, Tue, Wed, Thu, Fri, Sat, Sun]
      start: "00:00"
      end: "23:59"

  surge:
    maxUnavailable: 1
    # Generous for real EC2 to launch + join + become Ready (~30s observed).
    # Scenario C patches this to a sub-node-ready value (e.g. 15s) to force a
    # readyTimeout rollback; Scenario M Part B patches it to 120s.
    readyTimeout: 15m
    # Short cooldown so back-to-back scenarios are not gated by a prior success
    # or failure (cooldownAfter gates the NEXT rotation's start via
    # last-rotation-at / last-failure-at — keep it small).
    cooldownAfter: 1m
    # >= readyTimeout so the post-failure backoff never repeats the surge cost
    # faster than one attempt lasts (avoids the RetryBackoffShort finding) and is
    # long enough to observe a single rollback before any retry.
    retryBackoff: 30m
    matchNodeRequirements:
      required:
        - topology.kubernetes.io/zone
        - kubernetes.io/arch
        - karpenter.sh/capacity-type
      preferred: []

  prePull:
    enabled: false
