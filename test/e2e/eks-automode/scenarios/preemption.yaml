# Scenario M (placeholder preemption) helpers — SCENARIOS.md §4.
#
# A dedicated high-priority class + a "blocker" Pod that occupies the only
# same-AZ spare so the negative-priority surge placeholder cannot bind there,
# cannot preempt the blocker, and (with NodePool limits blocking new nodes) stays
# Pending until readyTimeout fires a clean rollback. The blocker carries a
# required anti-affinity to the candidate workload so it lands on its OWN node
# (not the candidate's) and a request large enough to claim a 4-vCPU node with
# only ~170m free — too little for the 250m placeholder.
#
# Cluster-specific value: set topology.kubernetes.io/zone to one of
# `terraform output availability_zones` (must match the candidate's AZ).
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: poc-high-priority
value: 1000000
preemptionPolicy: PreemptLowerPriority
description: "PoC Scenario M — preempts / blocks the negative-priority surge placeholder"
---
apiVersion: v1
kind: Pod
metadata:
  name: poc-blocker
  namespace: default
  labels:
    app: poc-blocker
spec:
  priorityClassName: poc-high-priority
  nodeSelector:
    noderotation-poc/pool: poc
    topology.kubernetes.io/zone: us-west-2a
  terminationGracePeriodSeconds: 0
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["poc-absorb-cand"]
          topologyKey: kubernetes.io/hostname
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.10
      resources:
        requests:
          cpu: 3600m   # claims a 4-vCPU node, leaving ~170m free — too little for the 250m placeholder
          memory: 64Mi
