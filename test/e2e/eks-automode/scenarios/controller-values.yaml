# Helm values overlay for the node-rotation-controller under the EKS Auto Mode
# PoC scenarios (issue #93, SCENARIOS.md). The chart is installed verbatim from
# charts/; only these test-specific knobs are overridden. image.repository and
# image.tag are supplied on the CLI (the ECR `poc` image), so they are absent here.

# A single replica keeps the PoC simple; the lone replica trivially wins leader
# election. The PDB is disabled so it never blocks teardown.
replicaCount: 1

podDisruptionBudget:
  enabled: false

# Keep the controller OFF every rotated pool. Otherwise Auto Mode consolidation
# can land the controller Pod on a rotated node, and rotating (or force-deleting)
# that node restarts the controller mid-scenario — resetting the in-memory metric
# counters and disrupting observation.
#
# Use a POSITIVE allowlist onto the EKS Auto Mode built-in pools (general-purpose
# / system), which no scenario rotates. A NotIn blocklist on a scenario's own
# label (nrc-poc's noderotation-poc/pool, or nodepool-ff's karpenter.sh/nodepool)
# is unsafe: a built-in-pool node lacks that label, so NotIn passes — but a
# rotated-pool node whose label is simply absent for a *different* scenario also
# passes, so the controller can still land there. Observed in Scenario O: with the
# old nrc-poc blocklist the controller was evicted onto a nodepool-ff node when its
# general-purpose host consolidated, restarting mid-run and resetting the counters.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: karpenter.sh/nodepool
              operator: In
              values: ["general-purpose", "system"]

# Human-readable logs so the rotation lifecycle is easy to follow.
logging:
  development: true

# The controller resolves each NodePool's governing RotationPolicy at reconcile
# time (issue #119); it no longer reads a policy.yaml ConfigMap. The live policy
# for the scenarios is scenarios/rotationpolicy.yaml (applied with kubectl after
# the Helm install) — it carries the ageThreshold/window/surge knobs the scenarios
# depend on, and the scenarios patch it live (no restart). Disable the chart's
# bundled sample RotationPolicy so that manifest is the only policy object in the
# cluster.
rotationPolicy:
  create: false
