# Helm values overlay for the node-rotation-controller under the EKS Auto Mode
# PoC scenarios (issue #93, SCENARIOS.md). The chart is installed verbatim from
# charts/; only these test-specific knobs are overridden. image.repository and
# image.tag are supplied on the CLI (the ECR `poc` image), so they are absent here.

# A single replica keeps the PoC simple; the lone replica trivially wins leader
# election. The PDB is disabled so it never blocks teardown.
replicaCount: 1

podDisruptionBudget:
  enabled: false

# Keep the controller OFF every rotated pool. Otherwise Auto Mode consolidation
# can land the controller Pod on a rotated node, and rotating (or force-deleting)
# that node restarts the controller mid-scenario — resetting the in-memory metric
# counters and disrupting observation.
#
# Use a POSITIVE allowlist onto the EKS Auto Mode built-in pools (general-purpose
# / system), which no scenario rotates. A NotIn blocklist on a scenario's own
# label (nrc-poc's noderotation-poc/pool, or nodepool-ff's karpenter.sh/nodepool)
# is unsafe: a built-in-pool node lacks that label, so NotIn passes — but a
# rotated-pool node whose label is simply absent for a *different* scenario also
# passes, so the controller can still land there. Observed in Scenario O: with the
# old nrc-poc blocklist the controller was evicted onto a nodepool-ff node when its
# general-purpose host consolidated, restarting mid-run and resetting the counters.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: karpenter.sh/nodepool
              operator: In
              values: ["general-purpose", "system"]

# Scenario P (issue #118) adds two more rotated pools, nodepool-soak and
# nodepool-soak-epi. This allowlist already excludes them by construction (it
# only ever admits "general-purpose"/"system"), so no change was needed here.

# Give the controller a priority the cluster won't preempt for lower-priority
# soak/scraper workload during the unattended 12h Scenario P run: issue #270
# found that a Guaranteed-QoS but priority-0 controller Pod can still be
# evicted under node pressure, which would show up as a false restartCount>0
# and break the soak's PASS criterion (restartCount==0 over 12h, SCENARIOS.md).
# system-cluster-critical is a built-in PriorityClass (merged for this overlay
# in PR #271). If admission rejects it outside kube-system at install time, fall
# back to applying a dedicated PriorityClass (value: 100000, see SCENARIOS.md
# Task 8) and point this at that name instead.
priorityClassName: system-cluster-critical

# Production JSON logs, NOT the --zap-devel console format: the Scenario P
# offline analyzer (scenarios/soak-analyze.py) parses the "rotation complete"
# lines out of the harvested controller.log as the per-rotation ledger, and only
# the JSON encoder carries the "msg"/"ts" fields it keys on — the console
# encoder emits "<ts>\tINFO\trotation complete\t{...kv only...}", whose trailing
# JSON object parses but holds neither, so every rotation would be silently
# skipped. "rotation complete" and the other lifecycle lines are Info-level, so
# nothing is lost at the JSON encoder's default Info level, and the runbook's
# log greps are substring-based and match either format.
logging:
  development: false

# The controller resolves each NodePool's governing RotationPolicy at reconcile
# time (issue #119). The live policy for the scenarios is
# scenarios/rotationpolicy.yaml (applied with kubectl after the Helm install) — it
# carries the ageThreshold/window/surge knobs the scenarios depend on, and the
# scenarios patch it live (no restart). Disable the chart's bundled sample
# RotationPolicy so that manifest is the only policy object in the cluster.
rotationPolicies: []
