# A single stateless pod pinned to the nrc-poc pool. Its cpu request (1) needs a
# dedicated 2-vCPU node, so the pool scales from zero to exactly one node. Used by
# the core make-before-break scenario (Scenario 0) and the limits/rollback
# scenarios (B, C). When the controller rotates the node, this pod drains via
# Karpenter's voluntary (PDB-respecting) path and reschedules onto the surge node.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poc-workload
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poc-workload
  template:
    metadata:
      labels:
        app: poc-workload
    spec:
      nodeSelector:
        noderotation-poc/pool: poc
      terminationGracePeriodSeconds: 10
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: "1"
              memory: 256Mi
