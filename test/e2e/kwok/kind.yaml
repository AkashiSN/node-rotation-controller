# kind cluster for the KWOK-based Karpenter e2e harness (issue #92).
#
# A single control-plane node hosts every real component — the KWOK controller,
# the Karpenter KWOK reference cloudprovider, and this controller. The virtual
# (KWOK) nodes Karpenter provisions are not kind nodes; they exist only as
# Kubernetes Node objects whose lifecycle KWOK fakes, so one kind node is enough.
#
# The node image is pinned by digest for reproducibility (issue #92 "pin the kind
# node image"). It is the default image shipped with the `sigs.k8s.io/kind`
# version pinned in aqua.yaml, which the Makefile/CI install — keep the two in
# lock-step (re-resolve from `strings $(aqua which kind) | grep kindest/node`).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
