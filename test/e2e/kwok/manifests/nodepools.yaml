# Two NodePools fronting the KWOK reference cloudprovider (issue #92).
#
#   nodepool-a  → in scope (label noderotation-e2e/pool=a); the controller rotates it.
#   nodepool-b  → a SECOND pool used to prove multi-NodePool confinement: it has
#                 spare capacity but must never absorb pool-a's placeholder.
#
# Both retain expireAfter as the §3.5 backstop (never removed by the controller),
# set very long here so the backstop never fires mid-test — the controller drives
# rotation via its ageThreshold override, not expiry. consolidationPolicy is
# WhenEmpty with a long consolidateAfter so KWOK does not spontaneously
# consolidate/disrupt nodes while the do-not-disrupt and confinement assertions
# run (the "voluntary disruption cannot be induced" form of the do-not-disrupt
# criterion — see e2e_test.go and README.md).
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: nodepool-a
  labels:
    noderotation-e2e/pool: a
    # Only pool-a is in the controller's scope (controller-values.yaml selector).
    # pool-b is deliberately out of scope so it can hold spare capacity that the
    # confinement assertions prove is never absorbed by pool-a's placeholder.
    noderotation-e2e/in-scope: "true"
spec:
  template:
    metadata:
      labels:
        noderotation-e2e/pool: a
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["test-zone-a"]
      nodeClassRef:
        name: default
        kind: KWOKNodeClass
        group: karpenter.kwok.sh
      expireAfter: 8760h # 365d: the §3.5 backstop, set far out so it never races the test
  limits:
    cpu: "1000"
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 8760h # effectively disabled for the duration of the test
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: nodepool-b
  labels:
    noderotation-e2e/pool: b
spec:
  template:
    metadata:
      labels:
        noderotation-e2e/pool: b
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["test-zone-a"]
      nodeClassRef:
        name: default
        kind: KWOKNodeClass
        group: karpenter.kwok.sh
      expireAfter: 8760h
  limits:
    cpu: "1000"
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 8760h
---
# nodepool-c → in scope for the forceful-fallback e2e (issue #156 D5). Governed by
# a DEDICATED RotationPolicy (rotationpolicy nodepool-c) with
# surge.forcefulFallback.enabled=true. It carries ff-scope (NOT in-scope), so
# rotationpolicy-a never matches it and the two policies never contend.
#
# expireAfter is SHORT (30m) so that once a candidate is eligible (age > the 2m
# ageThreshold), deadline-now (~28m) < t_rot. t_rot = readyTimeout + drainBound;
# terminationGracePeriod is deliberately UNSET so drainBound = DrainFallback (1h)
# and t_rot ≈ 62m — the trigger fires with wide margin. 30m is still far enough
# out that Karpenter never force-expires the node within the ~10m subtest.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: nodepool-c
  labels:
    noderotation-e2e/pool: c
    noderotation-e2e/ff-scope: "true"
spec:
  template:
    metadata:
      labels:
        noderotation-e2e/pool: c
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["test-zone-a"]
      nodeClassRef:
        name: default
        kind: KWOKNodeClass
        group: karpenter.kwok.sh
      expireAfter: 20m # SHORT initial stamp: the provisioned claim carries E=20m. The e2e raises this template to a feasible value at runtime, so the existing claim (immutable spec) becomes a §3.2 layer-3 short-lead candidate that triggers the §3.3 surge-less path.
  limits:
    cpu: "1000"
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 8760h
    budgets:
      # Raising the template expireAfter at runtime marks the existing NodeClaim
      # drifted; block Karpenter drift disruption so only the controller's
      # surge-less deletion rotates it (the scenario is not proved for the wrong
      # reason). Direct NodeClaim deletion still drains via termination regardless.
      - nodes: "0"
        reasons: ["Drifted"]
---
apiVersion: karpenter.kwok.sh/v1alpha1
kind: KWOKNodeClass
metadata:
  name: default
