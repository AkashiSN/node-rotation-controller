---
# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/aqua-policy.json
#
# aqua enforces a policy before installing packages from a non-standard (local)
# registry. Once any policy file is in effect, EVERY package must be allowed by it
# — including the standard registry — so this file trusts both the standard
# registry and the local registry (aqua/registry.yaml) that provides controller-gen.
# The standard ref MUST be a semver() constraint, not a pinned tag: a pinned ref
# does not match the registry version resolved from aqua.yaml and silently denies
# every standard package.
#
# The Makefile exports AQUA_POLICY_CONFIG pointing at this file, which trusts it
# deterministically (no per-machine `aqua policy allow` state) so `make` works the
# same locally and in CI.
registries:
  - type: standard
    ref: semver(">= 0.0.0")
  - name: local
    type: local
    path: aqua/registry.yaml
packages:
  - registry: standard
  - registry: local
